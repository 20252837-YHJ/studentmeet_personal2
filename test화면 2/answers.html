<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudentMeet — 답변 열람</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════
       헤더
       ══════════════════════════════════ -->
  <header class="site-header">
    <div class="container inner">

      <div class="back-btn" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        목록으로
      </div>

      <span class="logo" style="margin-right:auto;">Student<em>Meet</em></span>

      <button class="notif-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════
       본문
       ══════════════════════════════════ -->
  <main class="container">

    <!-- 학생 프로필 헤더 (JS에서 동적 삽입) -->
    <div id="profile-header"></div>

    <!-- 탭 바 -->
    <div class="tab-bar">
      <button
        class="tab-btn tab-btn--on"
        onclick="switchTab('answers', this)"
      >답변 보기</button>
      <button
        class="tab-btn tab-btn--off"
        onclick="switchTab('memo', this)"
      >내 메모</button>
    </div>

    <!-- 탭 콘텐츠 -->
    <div id="tab-answers"></div>

    <!-- 메모 섹션 (탭 전환 시 표시) -->
    <div id="tab-memo" style="display:none;">
      <div class="memo-box">
        <h2>📝 대화 후 메모 남기기</h2>
        <textarea
          id="memo-input"
          class="memo-textarea"
          placeholder="대화하면서 인상 깊었던 점을 적어보세요..."
        ></textarea>
        <button class="memo-save-btn" onclick="saveMemo()">메모 저장</button>
      </div>
    </div>

  </main>

  <script src="answers.js"></script>
</body>
</html>
